[package]
name = "necron-prism"
version = "0.0.0"
edition = "2024"
authors = [ "Me0wo", "Necron-Dev" ]

[dependencies]
regex = "1.11"
rustix = { version = "1.1", features = ["pipe"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
socket2 = "0.6"
toml = "1.0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
valence_protocol = "0.2.0-alpha.1"
