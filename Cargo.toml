[package]
name = "necron-prism"
version = "0.0.0"
edition = "2024"
authors = [ "Me0wo", "Necron-Dev" ]

[features]
default = ["http-api"]
http-api = ["dep:reqwest", "dep:tokio"]
schema = ["dep:schemars"]

[dependencies]
base64 = "0.22"
mime_guess = { version = "2.0", default-features = false }
reqwest = { version = "0.13.2", default-features = false, features = ["json", "query", "rustls"], optional = true }
rustix = { version = "1.1", default-features = false, features = ["pipe", "std"] }
schemars = { version = "1.0", features = ["derive"], optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
socket2 = { version = "0.6", default-features = false, features = ["all"] }
tokio = { version = "1.48", default-features = false, features = ["rt-multi-thread", "time"], optional = true }
toml = "1.0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
valence_protocol = "0.2.0-alpha.1"
thiserror = "2.0.18"
anyhow = "1.0"
lru = "0.16.3"
minijinja = "2.0"

[[bin]]
name = "generate_config_schema"
path = "src/bin/generate_config_schema.rs"
required-features = ["schema"]

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
incremental = false
