#:schema ./config.schema.json

[inbound]
listen_addr = "0.0.0.0:25565"
first_packet_timeout_ms = 5000

[inbound.socket]
tcp_nodelay = true
keepalive_secs = 30
reuse_port = false

[transport.motd]
mode = "local"
json = '{"version":{"name":"§bnecron-prism §7status","protocol":-1},"players":{"max":100,"online":%ONLINE_PLAYER%,"sample":[{"name":"§7mode §8> §f%RELAY_MODE%","id":"00000000-0000-0000-0000-000000000001"},{"name":"§7ping §8> §b%PING_MODE%","id":"00000000-0000-0000-0000-000000000002"},{"name":"§7target §8> §f%MOTD_TARGET_ADDR%","id":"00000000-0000-0000-0000-000000000003"}]},"description":{"text":"§bnecron-prism §8» §fclean minecraft relay\n§7online §f%ONLINE_PLAYER% §8| §7favicon §f%FAVICON_MODE% §8| §7ping §b%PING_MODE%"}}'
upstream_addr = "mc.hypixel.net:25565"
protocol = "client"
ping_mode = "0ms"
upstream_ping_timeout_ms = 1500
status_cache_ttl_ms = 1000

[transport.motd.ping]
target_addr = "mc.hypixel.net:25565"

[transport.motd.favicon]
mode = "remove"
target_addr = "mc.hypixel.net:25565"

[relay]
mode = "standard"

[api]
mode = "mock"
timeout_ms = 3000
traffic_interval_ms = 5000

[api.mock]
target_addr = "mc.hypixel.net:25565"
connection_id_prefix = "debug"

[runtime]
stats_log_interval_secs = 10

[runtime.logging]
level = "info"
format = "pretty"
async_enabled = true
