[package]
name = "necron-prism"
version = "0.0.0"
edition = "2024"
authors = [ "Me0wo", "Necron-Dev" ]

[dependencies]
libc = { version = "0.2", default-features = false }
regex = "1.11"
reqwest = { version = "0.13.2", default-features = false, features = ["json", "query", "rustls"] }
rustix = { version = "1.1", default-features = false, features = ["pipe", "std"] }
schemars = { version = "1.0", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
socket2 = { version = "0.6", default-features = false, features = ["all"] }
tokio = { version = "1.48", default-features = false, features = ["rt-multi-thread", "time"] }
toml = "1.0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
valence_protocol = "0.2.0-alpha.1"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
incremental = false
